spring.application.name=notification-service
server.port=8082
spring.datasource.driver-class-name = org.postgresql.Driver
spring.datasource.url = jdbc:postgresql://localhost:5432/bank_system
spring.datasource.username=postgres
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false


#Kafka consumer  configuration
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.group-id=notification-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.properties.spring.json.trusted.packages=*

spring.kafka.consumer.enable-auto-commit=false


# Flyway configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:/db/migration

# database schema name
spring.flyway.schemas=notification_db

# if schema does not exist, Flyway can create it
spring.flyway.create-schemas=true

# why because flyway and hibernate act differently
spring.jpa.properties.hibernate.default_schema=notification_db